<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro‘yxatdan o‘tish</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#000814, #001d3d);
  color: white;
  text-align: center;
}

form {
  margin-top: 50px;
}

input, button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: gold;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Ro‘yxatdan o‘tish</h2>

<form id="form">
<input type="text" id="name" placeholder="Ismingiz" required>
<input type="text" id="phone" placeholder="Telefon" required>
<button type="submit">Yuborish</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;

  var message = "🥋 Yangi o‘quvchi:\n\n👤 Ism: " + name + "\n📞 Telefon: " + phone;

  var token = "TOKEN";
  var chat_id = "CHAT_ID";

  fetch("https://api.telegram.org/bot" + token + "/sendMessage", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: chat_id,
      text: message
    })
  })
  .then(() => {
    alert("Yuborildi ✅");
  })
  .catch(() => {
    alert("Xatolik ❌");
  });
});
</script>

</body>
</html>
