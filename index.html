<meta charset="UTF-8">

<title>SPARTA TKD</title>

<style>

/* BACKGROUND ANIMATION */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(-45deg, #000814, #001d3d, #001233, #000814);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite, fadeIn 1.5s ease;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* TITLE */
h1 {
  color: gold;
  margin-top: 15px;
  letter-spacing: 2px;
}

/* LOGO */
.logo {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  object-fit: cover;
  margin: 30px auto;
  display: block;

  box-shadow:
    0 0 10px gold,
    0 0 30px gold,
    0 0 60px gold;

  animation: pulse 2.5s infinite;
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.15) rotate(5deg);
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* BUTTON */
.btn {
  display: block;
  width: 80%;
  margin: 15px auto;
  padding: 16px;
  border-radius: 35px;

  background: rgba(29, 53, 87, 0.6);
  backdrop-filter: blur(12px);

  color: white;
  text-decoration: none;
  font-size: 18px;

  box-shadow:
    0 0 10px #1d3557,
    0 0 25px #1d3557;

  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: gold;
  color: black;

  box-shadow:
    0 0 15px gold,
    0 0 40px gold;
}

.icon {
  margin-right: 10px;
  font-size: 20px;
}

</style>
</head>

<body>

<img src="logo.PNG" class="logo">
